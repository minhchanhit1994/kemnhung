<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Box body -->
  <rect x="8" y="26" width="48" height="30" rx="4" fill="url(#box)"/>
  <!-- Box lid -->
  <rect x="4" y="18" width="56" height="12" rx="4" fill="url(#lid)"/>
  <!-- Vertical ribbon -->
  <rect x="27" y="18" width="10" height="38" rx="2" fill="url(#ribbon)"/>
  <!-- Horizontal ribbon -->
  <rect x="4" y="22" width="56" height="6" rx="2" fill="url(#ribbon)"/>
  <!-- Bow left loop -->
  <ellipse cx="26" cy="16" rx="10" ry="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5" transform="rotate(-20 26 16)"/>
  <!-- Bow right loop -->
  <ellipse cx="38" cy="16" rx="10" ry="8" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" transform="rotate(20 38 16)"/>
  <!-- Bow center -->
  <circle cx="32" cy="18" r="4" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
</svg>
